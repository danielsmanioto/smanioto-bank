<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Minha Conta — smanioto-bank</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="page">
    <div class="page-header">
      <h1>smanioto-bank</h1>
      <button id="btnLogout" class="btn btn-danger">Sair</button>
    </div>

    <div class="card">
      <div class="info-grid">
        <div class="info-item">
          <label>Banco</label>
          <span id="bank">—</span>
        </div>
        <div class="info-item">
          <label>Agência</label>
          <span id="branch">—</span>
        </div>
        <div class="info-item">
          <label>Número da Conta</label>
          <span id="number">—</span>
        </div>
        <div class="info-item">
          <label>Saldo Disponível</label>
          <span id="balance" class="balance-value">—</span>
        </div>
      </div>

      <div class="nav-actions">
        <a id="linkStatement" href="#" class="btn btn-secondary">Ver Extrato</a>
        <a id="linkTransfer" href="#" class="btn btn-primary">Transferir</a>
      </div>

      <div id="errorMsg" class="msg msg-error"></div>
    </div>
  </div>
  <script type="module" src="js/account.js"></script>
</body>
</html>
